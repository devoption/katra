name: Tagged Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
      version:
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: tagged-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  context:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Derive release version from tag
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-$PUSH_TAG}"

          if [[ -z "$tag" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$INPUT_VERSION" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}" >> "$GITHUB_OUTPUT"

  release:
    needs:
      - context
    if: needs.context.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Create or update GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.context.outputs.tag }}
          RELEASE_VERSION: ${{ needs.context.outputs.version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const releaseName = `Katra ${tag}`;

            const notes = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: tag,
            });

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: releaseName,
                body: notes.data.body,
                draft: false,
                prerelease: false,
              });

              console.log(`Updated GitHub release for ${tag} (${version}).`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: notes.data.body,
                draft: false,
                prerelease: false,
              });

              console.log(`Created GitHub release for ${tag} (${version}).`);
            }

  macos_artifacts:
    needs:
      - context
      - release
    if: needs.context.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: macos-15-intel
            surreal_asset_architecture: amd64
          - architecture: arm64
            runner: macos-15
            surreal_asset_architecture: arm64
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      NATIVEPHP_APP_VERSION: ${{ needs.context.outputs.version }}
      NATIVEPHP_UPDATER_ENABLED: false
      SURREAL_VERSION: v3.0.4
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Install NativePHP resources
        run: php artisan native:install --force --no-interaction

      - name: Bundle Surreal runtime
        run: |
          set -euo pipefail

          runtime_dir="extras/surreal/bin"
          archive="surreal-${SURREAL_VERSION}.darwin-${{ matrix.surreal_asset_architecture }}.tgz"
          archive_path="build/surreal-runtime/$archive"

          rm -rf extras/surreal
          mkdir -p "$runtime_dir" build/surreal-runtime

          gh release download "$SURREAL_VERSION" \
            --repo surrealdb/surrealdb \
            --pattern "$archive" \
            --dir build/surreal-runtime

          expected_digest="$(gh api repos/surrealdb/surrealdb/releases/tags/${SURREAL_VERSION} --jq ".assets[] | select(.name == \"${archive}\") | .digest")"

          if [[ -z "$expected_digest" || "$expected_digest" == "null" ]]; then
            echo "Unable to resolve a published digest for ${archive}." >&2
            exit 1
          fi

          actual_digest="sha256:$(shasum -a 256 "$archive_path" | awk '{print $1}')"

          if [[ "$actual_digest" != "$expected_digest" ]]; then
            echo "Digest mismatch for ${archive}: expected ${expected_digest}, got ${actual_digest}." >&2
            exit 1
          fi

          tar -xzf "$archive_path" -C "$runtime_dir"
          chmod +x "$runtime_dir/surreal"

      - name: Force consistent ad-hoc macOS signing
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          const path = 'vendor/nativephp/desktop/resources/electron/electron-builder.mjs';
          const current = readFileSync(path, 'utf8');
          const normalized = current.replace(/\r\n/g, '\n');
          const pattern = /^(\s*mac:\s*\{\n)([\s\S]*?)(^\s*\},\n)/m;
          const match = normalized.match(pattern);

          if (! match) {
            throw new Error('Unable to locate the NativePHP mac builder block.');
          }

          const macBlock = match[2];

          if (! macBlock.includes("entitlementsInherit: 'build/entitlements.mac.plist'")) {
            throw new Error('NativePHP mac builder block is missing entitlementsInherit.');
          }

          const adHocSettings = [
            "        identity: '-',",
            '        hardenedRuntime: false,',
            '        notarize: false,',
            '        gatekeeperAssess: false,',
          ];

          const updatedMacBlock = macBlock.includes("identity: '-'")
            ? macBlock
            : macBlock.replace(
                /(^\s*entitlementsInherit:\s*'build\/entitlements\.mac\.plist',\n)/m,
                `$1${adHocSettings.join('\n')}\n`,
              );

          if (updatedMacBlock === macBlock) {
            throw new Error('Unable to apply preview macOS signing overrides.');
          }

          writeFileSync(path, normalized.replace(pattern, `$1${updatedMacBlock}$3`));
          NODE

      - name: Validate patched Electron builder config
        run: node --check vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build macOS desktop artifact
        run: php artisan native:build mac ${{ matrix.architecture }} --no-interaction

      - name: Stage architecture-specific release assets
        run: |
          set -euo pipefail

          mkdir -p nativephp/electron/release-assets
          shopt -s nullglob

          staged_files=0

          for candidate in nativephp/electron/dist/*; do
            if [[ ! -f "$candidate" ]]; then
              continue
            fi

            filename="$(basename "$candidate")"
            staged_name="$filename"

            if [[ "$filename" != *"-${{ matrix.architecture }}."* ]]; then
              extension="${filename##*.}"
              basename="${filename%.*}"

              if [[ "$basename" == "$filename" ]]; then
                staged_name="${filename}-${{ matrix.architecture }}"
              else
                staged_name="${basename}-${{ matrix.architecture }}.${extension}"
              fi
            fi

            cp "$candidate" "nativephp/electron/release-assets/$staged_name"
            staged_files=$((staged_files + 1))
          done

          if (( staged_files == 0 )); then
            echo "No macOS release files were generated." >&2
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: katra-macos-${{ matrix.architecture }}-${{ needs.context.outputs.version }}
          path: ${{ github.workspace }}/nativephp/electron/release-assets
          if-no-files-found: error

      - name: Upload release assets
        env:
          RELEASE_TAG: ${{ needs.context.outputs.tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          release_files=()

          for candidate in nativephp/electron/release-assets/*; do
            if [[ -f "$candidate" ]]; then
              release_files+=("$candidate")
            fi
          done

          if (( ${#release_files[@]} == 0 )); then
            echo "No macOS release files were generated." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${release_files[@]}" --clobber

      - name: Summarize packaging status
        run: |
          {
            echo "## macOS Packaging"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Architecture: \`${{ matrix.architecture }}\`"
            echo "- Release tag: \`${{ needs.context.outputs.tag }}\`"
            echo "- Bundled Surreal runtime: \`${SURREAL_VERSION}\` (\`${{ matrix.surreal_asset_architecture }}\` asset)"
            echo
            echo "- Preview builds are packaged with an explicit ad-hoc macOS signature for launch consistency."
            echo "- Developer ID signing and notarization remain tracked separately before trusted distribution."
          } >> "$GITHUB_STEP_SUMMARY"
